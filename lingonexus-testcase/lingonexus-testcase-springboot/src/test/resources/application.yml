# LingoNexus Spring Boot 配置示例
lingonexus:
  # 默认脚本语言
  default-language: groovy

  # 缓存配置
  cache:
    enabled: true
    max-size: 100
    expire-after-write-ms: 300000  # 5分钟
    expire-after-access-ms: 600000 # 10分钟

  # 沙箱安全配置
  sandbox:
    enabled: true
    max-script-size: 65536
    timeout-ms: 5000
    enable-engine-cache: true
    # 类白名单（允许访问的类）- 测试环境留空以允许所有类
    class-whitelist:
    # 类黑名单（禁止访问的类）- 测试环境留空
    class-blacklist:

  # 线程池配置
  executor:
    core-pool-size: 4
    max-pool-size: 8
    keep-alive-time-seconds: 60
    queue-capacity: 100
    # ASYNC_EXECUTOR 线程名前缀（可选，留空则使用默认的 ScriptExecutor-Async-）
    thread-name-prefix: "MyCustomAsync-"
    # 拒绝策略：CALLER_RUNS（调用者运行）、ABORT（中止）、DISCARD（丢弃）、DISCARD_OLDEST（丢弃最旧）
    rejection-policy: CALLER_RUNS

  # 模块黑名单（排除的模块）
  exclude-script-modules:
    # 可以使用类全限定名
    # - io.github.koyan9.lingonexus.utils.MathModule
    # 可以使用模块名
    # - math
    # 可以使用通配符
    # - io.github.koyan9.lingonexus.utils.*

  # 模块白名单（仅允许的模块，如果设置则只有这些模块可用）
  allowed-script-modules:
    # 留空表示允许所有模块（除了黑名单中的）

  # 全局变量配置
  global-variables:
    appName: "LingoNexus Test Application"
    version: "1.0.0"
    maxRetries: 3
    enableDebug: true

  metadata:
    policy-templates:
      spring-timing-thread:
        parent-policy-name: timing
        categories:
          - THREAD
